syntax = "proto3";

package gb_mahjong.client.v1;

option java_multiple_files = true;
option java_package = "com.gbmahjong.client.v1";
option csharp_namespace = "GbMahjong.Client.V1";

// Seat position also doubles as the wind identity in round metadata.
enum Seat {
  SEAT_UNSPECIFIED = 0;
  SEAT_EAST = 1;
  SEAT_SOUTH = 2;
  SEAT_WEST = 3;
  SEAT_NORTH = 4;
}

// TILE_UNKNOWN is used when the server needs to hide concealed information
// from a recipient while still preserving the structure of the event or meld.
enum Tile {
  TILE_UNSPECIFIED = 0;
  TILE_UNKNOWN = 1;

  TILE_CHARACTER_1 = 2;
  TILE_CHARACTER_2 = 3;
  TILE_CHARACTER_3 = 4;
  TILE_CHARACTER_4 = 5;
  TILE_CHARACTER_5 = 6;
  TILE_CHARACTER_6 = 7;
  TILE_CHARACTER_7 = 8;
  TILE_CHARACTER_8 = 9;
  TILE_CHARACTER_9 = 10;

  TILE_BAMBOO_1 = 11;
  TILE_BAMBOO_2 = 12;
  TILE_BAMBOO_3 = 13;
  TILE_BAMBOO_4 = 14;
  TILE_BAMBOO_5 = 15;
  TILE_BAMBOO_6 = 16;
  TILE_BAMBOO_7 = 17;
  TILE_BAMBOO_8 = 18;
  TILE_BAMBOO_9 = 19;

  TILE_DOT_1 = 20;
  TILE_DOT_2 = 21;
  TILE_DOT_3 = 22;
  TILE_DOT_4 = 23;
  TILE_DOT_5 = 24;
  TILE_DOT_6 = 25;
  TILE_DOT_7 = 26;
  TILE_DOT_8 = 27;
  TILE_DOT_9 = 28;

  TILE_EAST_WIND = 29;
  TILE_SOUTH_WIND = 30;
  TILE_WEST_WIND = 31;
  TILE_NORTH_WIND = 32;

  TILE_RED_DRAGON = 33;
  TILE_GREEN_DRAGON = 34;
  TILE_WHITE_DRAGON = 35;

  TILE_FLOWER_PLUM = 36;
  TILE_FLOWER_ORCHID = 37;
  TILE_FLOWER_BAMBOO = 38;
  TILE_FLOWER_CHRYSANTHEMUM = 39;

  TILE_SEASON_SPRING = 40;
  TILE_SEASON_SUMMER = 41;
  TILE_SEASON_AUTUMN = 42;
  TILE_SEASON_WINTER = 43;
}

enum GamePhase {
  GAME_PHASE_UNSPECIFIED = 0;
  GAME_PHASE_LOBBY = 1;
  GAME_PHASE_DEALING = 2;
  GAME_PHASE_REPLACING_FLOWER = 3;
  GAME_PHASE_DRAWING = 4;
  GAME_PHASE_WAITING_DISCARD = 5;
  GAME_PHASE_WAITING_CLAIM = 6;
  GAME_PHASE_RESOLVING_KONG = 7;
  GAME_PHASE_ROUND_SETTLEMENT = 8;
  GAME_PHASE_MATCH_SETTLEMENT = 9;
}

enum PlayerStatus {
  PLAYER_STATUS_UNSPECIFIED = 0;
  PLAYER_STATUS_JOINED = 1;
  PLAYER_STATUS_READY = 2;
  PLAYER_STATUS_PLAYING = 3;
  PLAYER_STATUS_DISCONNECTED = 4;
  PLAYER_STATUS_RECONNECTING = 5;
  PLAYER_STATUS_AUTO_PLAY = 6;
  PLAYER_STATUS_LEFT = 7;
}

enum ActionKind {
  ACTION_KIND_UNSPECIFIED = 0;
  ACTION_KIND_DRAW = 1;
  ACTION_KIND_DISCARD = 2;
  ACTION_KIND_CHI = 3;
  ACTION_KIND_PENG = 4;
  ACTION_KIND_EXPOSED_KONG = 5;
  ACTION_KIND_CONCEALED_KONG = 6;
  ACTION_KIND_SUPPLEMENTAL_KONG = 7;
  ACTION_KIND_DECLARE_WIN = 8;
  ACTION_KIND_PASS = 9;
  ACTION_KIND_REPLACE_FLOWER = 10;
  ACTION_KIND_READY = 11;
  ACTION_KIND_START_ROUND = 12;
  ACTION_KIND_END_ROUND = 13;
  ACTION_KIND_TURN_ADVANCE = 14;
  ACTION_KIND_AUTO_PLAY_TOGGLE = 15;
}

enum ClaimKind {
  CLAIM_KIND_UNSPECIFIED = 0;
  CLAIM_KIND_CHI = 1;
  CLAIM_KIND_PENG = 2;
  CLAIM_KIND_EXPOSED_KONG = 3;
  CLAIM_KIND_DISCARD_WIN = 4;
  CLAIM_KIND_ROB_KONG_WIN = 5;
}

enum WinType {
  WIN_TYPE_UNSPECIFIED = 0;
  WIN_TYPE_SELF_DRAW = 1;
  WIN_TYPE_DISCARD = 2;
  WIN_TYPE_ROB_KONG = 3;
  WIN_TYPE_KONG_DRAW = 4;
}

enum RejectCode {
  REJECT_CODE_UNSPECIFIED = 0;
  REJECT_CODE_INVALID_REQUEST = 1;
  REJECT_CODE_AUTH_FAILED = 2;
  REJECT_CODE_ROOM_NOT_FOUND = 3;
  REJECT_CODE_MATCH_ALREADY_STARTED = 4;
  REJECT_CODE_SEAT_UNAVAILABLE = 5;
  REJECT_CODE_ALREADY_JOINED = 6;
  REJECT_CODE_NOT_IN_ROOM = 7;
  REJECT_CODE_PHASE_MISMATCH = 8;
  REJECT_CODE_NOT_YOUR_TURN = 9;
  REJECT_CODE_ACTION_WINDOW_CLOSED = 10;
  REJECT_CODE_STALE_EVENT_SEQ = 11;
  REJECT_CODE_INVALID_TILE = 12;
  REJECT_CODE_ACTION_NOT_AVAILABLE = 13;
  REJECT_CODE_RULE_VALIDATION_FAILED = 14;
  REJECT_CODE_INTERNAL_ERROR = 15;
}

enum MeldKind {
  MELD_KIND_UNSPECIFIED = 0;
  MELD_KIND_CHI = 1;
  MELD_KIND_PENG = 2;
  MELD_KIND_EXPOSED_KONG = 3;
  MELD_KIND_CONCEALED_KONG = 4;
  MELD_KIND_SUPPLEMENTAL_KONG = 5;
}

enum SyncReason {
  SYNC_REASON_UNSPECIFIED = 0;
  SYNC_REASON_INITIAL_JOIN = 1;
  SYNC_REASON_RECONNECT = 2;
  SYNC_REASON_SERVER_RESYNC = 3;
  SYNC_REASON_ROUND_START = 4;
}

enum SettlementFlag {
  SETTLEMENT_FLAG_UNSPECIFIED = 0;
  SETTLEMENT_FLAG_SELF_DRAW = 1;
  SETTLEMENT_FLAG_DISCARD_WIN = 2;
  SETTLEMENT_FLAG_ROB_KONG_WIN = 3;
  SETTLEMENT_FLAG_KONG_DRAW_WIN = 4;
  SETTLEMENT_FLAG_LAST_TILE = 5;
  SETTLEMENT_FLAG_DRAW_GAME = 6;
}

message ClientFrame {
  string request_id = 1;

  oneof payload {
    JoinRoomRequest join_room = 10;
    ReadyRequest ready = 11;
    Heartbeat heartbeat = 12;
    ResumeSessionRequest resume_session = 13;
    PlayerActionRequest player_action = 14;
  }
}

message ServerFrame {
  uint64 event_seq = 1;

  oneof payload {
    JoinRoomResponse join_room = 10;
    SyncState sync_state = 11;
    ActionBroadcast action_broadcast = 12;
    ActionPrompt action_prompt = 13;
    ActionRejected action_rejected = 14;
    PlayerConnectionChanged player_connection_changed = 15;
    RoundSettlement round_settlement = 16;
    MatchSettlement match_settlement = 17;
    Pong pong = 18;
  }
}

message RoomConfig {
  string ruleset_id = 1;
  uint32 seat_count = 2;
  bool enable_flower_tiles = 3;
  bool enable_robbing_kong = 4;
  bool enable_kong_draw = 5;
  uint32 reconnect_grace_seconds = 6;
  uint32 action_timeout_ms = 7;
}

message JoinRoomRequest {
  string room_id = 1;
  string user_id = 2;
  string session_token = 3;
  string display_name = 4;
  string client_version = 5;
}

message JoinRoomResponse {
  string request_id = 1;
  bool accepted = 2;
  RejectCode reject_code = 3;
  string room_id = 4;
  string match_id = 5;
  Seat seat = 6;
  string connection_id = 7;
  string resume_token = 8;
  RoomConfig room_config = 9;
  string message = 10;
  uint64 latest_event_seq = 11;
}

message ReadyRequest {
  bool ready = 1;
}

message Heartbeat {
  uint64 client_time_ms = 1;
  uint64 last_received_event_seq = 2;
}

message ResumeSessionRequest {
  string room_id = 1;
  string user_id = 2;
  string resume_token = 3;
  uint64 last_received_event_seq = 4;
}

message PlayerActionRequest {
  string room_id = 1;
  string match_id = 2;
  string round_id = 3;
  uint64 expected_event_seq = 4;
  uint64 action_window_id = 5;

  oneof action {
    DiscardAction discard = 10;
    ClaimAction claim = 11;
    DeclareWinAction declare_win = 12;
    PassAction pass = 13;
    SupplementalKongAction supplemental_kong = 14;
    AutoPlayToggleAction auto_play_toggle = 15;
  }
}

message DiscardAction {
  Tile tile = 1;
  bool tsumogiri = 2;
}

message ClaimAction {
  ClaimKind claim_kind = 1;
  Tile target_tile = 2;
  repeated Tile consume_tiles = 3;
  Seat source_seat = 4;
  uint64 source_event_seq = 5;
}

message DeclareWinAction {
  WinType win_type = 1;
  Tile winning_tile = 2;
  Seat source_seat = 3;
  uint64 source_event_seq = 4;
}

message PassAction {
  uint64 source_event_seq = 1;
}

message SupplementalKongAction {
  Tile tile = 1;
}

message AutoPlayToggleAction {
  bool enabled = 1;
}

message SyncState {
  string room_id = 1;
  string match_id = 2;
  string round_id = 3;
  SyncReason reason = 4;
  uint64 server_time_ms = 5;
  GameSnapshot snapshot = 6;
}

message GameSnapshot {
  RoomConfig room_config = 1;
  GamePhase phase = 2;
  Seat self_seat = 3;
  Seat prevailing_wind = 4;
  Seat dealer_seat = 5;
  Seat current_turn_seat = 6;
  uint32 hand_number = 7;
  uint32 dealer_streak = 8;
  uint32 wall_tiles_remaining = 9;
  uint32 dead_wall_tiles_remaining = 10;
  uint64 latest_event_seq = 11;
  repeated PlayerState players = 12;
  SelfHandState self_hand = 13;
  ClaimWindow active_claim_window = 14;
  uint64 action_deadline_unix_ms = 15;
}

message PlayerState {
  string user_id = 1;
  string display_name = 2;
  Seat seat = 3;
  PlayerStatus status = 4;
  int64 score = 5;
  bool is_dealer = 6;
  bool is_connected = 7;
  bool auto_play_enabled = 8;
  uint32 concealed_tile_count = 9;
  repeated Meld melds = 10;
  repeated DiscardTile discards = 11;
  repeated Tile flowers = 12;
  uint32 replacement_draw_count = 13;
}

message SelfHandState {
  repeated Tile concealed_tiles = 1;
  Tile drawn_tile = 2;
}

message Meld {
  MeldKind kind = 1;
  repeated Tile tiles = 2;
  Seat from_seat = 3;
  Tile claimed_tile = 4;
  bool concealed = 5;
  uint64 source_event_seq = 6;
}

message DiscardTile {
  Tile tile = 1;
  uint32 turn_index = 2;
  bool claimed = 3;
  bool drawn_and_discarded = 4;
  uint64 source_event_seq = 5;
}

// In SyncState, options are scoped to the recipient. Eligible seats are global.
message ClaimWindow {
  uint64 action_window_id = 1;
  uint64 source_event_seq = 2;
  Seat source_seat = 3;
  Tile target_tile = 4;
  ActionKind trigger_action_kind = 5;
  repeated Seat eligible_seats = 6;
  repeated PromptOption options = 7;
  uint64 deadline_unix_ms = 8;
}

message PromptOption {
  string option_id = 1;
  ActionKind action_kind = 2;
  ClaimKind claim_kind = 3;
  WinType win_type = 4;
  repeated Tile candidate_tiles = 5;
  repeated Tile consume_tiles = 6;
}

message ActionPrompt {
  string room_id = 1;
  string match_id = 2;
  string round_id = 3;
  uint64 event_seq = 4;
  uint64 action_window_id = 5;
  Seat actor_seat = 6;
  repeated PromptOption options = 7;
  uint64 deadline_unix_ms = 8;
}

message ActionBroadcast {
  string room_id = 1;
  string match_id = 2;
  string round_id = 3;
  uint64 event_seq = 4;
  Seat actor_seat = 5;
  ActionKind action_kind = 6;
  ActionDetail action_detail = 7;
  repeated ResultingEffect resulting_effects = 8;
  GamePhase resulting_phase = 9;
  Seat next_turn_seat = 10;
  uint32 wall_tiles_remaining = 11;
  uint64 action_deadline_unix_ms = 12;
}

message ActionDetail {
  oneof detail {
    DrawDetail draw = 1;
    DiscardAction discard = 2;
    ResolvedClaim claim = 3;
    DeclareWinAction declare_win = 4;
    PassAction pass = 5;
    SupplementalKongAction supplemental_kong = 6;
    FlowerReplacementDetail flower_replacement = 7;
    StatusChangeDetail status_change = 8;
    PhaseChangeDetail phase_change = 9;
    AutoPlayToggleAction auto_play_toggle = 10;
  }
}

message DrawDetail {
  Tile tile = 1;
  bool visible_to_recipient = 2;
  bool replacement_draw = 3;
}

message ResolvedClaim {
  ClaimKind claim_kind = 1;
  Tile target_tile = 2;
  repeated Tile consume_tiles = 3;
  Seat source_seat = 4;
  Meld resulting_meld = 5;
}

message FlowerReplacementDetail {
  repeated Tile flowers_revealed = 1;
  uint32 replacement_draws = 2;
}

message StatusChangeDetail {
  bool ready = 1;
  bool auto_play_enabled = 2;
  PlayerStatus new_status = 3;
}

message PhaseChangeDetail {
  GamePhase phase = 1;
  string round_id = 2;
}

message ResultingEffect {
  oneof effect {
    HandCountDelta hand_count_delta = 1;
    ScoreDelta score_delta = 2;
    TurnAdvanced turn_advanced = 3;
    MeldAdded meld_added = 4;
    DiscardAdded discard_added = 5;
    FlowerAdded flower_added = 6;
    PromptOpened prompt_opened = 7;
  }
}

message HandCountDelta {
  Seat seat = 1;
  uint32 concealed_tile_count = 2;
}

message ScoreDelta {
  Seat seat = 1;
  int64 delta = 2;
  int64 new_total = 3;
}

message TurnAdvanced {
  Seat next_turn_seat = 1;
  GamePhase resulting_phase = 2;
}

message MeldAdded {
  Seat seat = 1;
  Meld meld = 2;
}

message DiscardAdded {
  Seat seat = 1;
  DiscardTile discard = 2;
}

message FlowerAdded {
  Seat seat = 1;
  repeated Tile flowers = 2;
}

message PromptOpened {
  ClaimWindow claim_window = 1;
}

message ActionRejected {
  string request_id = 1;
  RejectCode reject_code = 2;
  string message = 3;
  uint64 expected_event_seq = 4;
  uint64 actual_event_seq = 5;
  uint64 action_window_id = 6;
}

message PlayerConnectionChanged {
  string room_id = 1;
  string match_id = 2;
  string user_id = 3;
  Seat seat = 4;
  PlayerStatus status = 5;
  bool connected = 6;
  uint64 reconnect_deadline_unix_ms = 7;
}

message RoundSettlement {
  string room_id = 1;
  string match_id = 2;
  string round_id = 3;
  Seat prevailing_wind = 4;
  uint32 hand_number = 5;
  Seat dealer_seat = 6;
  WinType win_type = 7;
  Seat winner_seat = 8;
  Seat discarder_seat = 9;
  Tile winning_tile = 10;
  repeated RoundPlayerResult player_results = 11;
  repeated FanDetail fan_details = 12;
  repeated RevealedHand revealed_hands = 13;
  repeated SettlementFlag settlement_flags = 14;
  uint32 wall_tiles_remaining = 15;
}

message RoundPlayerResult {
  Seat seat = 1;
  int64 round_delta = 2;
  int64 total_score_after = 3;
}

message FanDetail {
  string fan_code = 1;
  string fan_name = 2;
  uint32 fan_value = 3;
  uint32 count = 4;
  string description = 5;
}

message RevealedHand {
  Seat seat = 1;
  repeated Tile concealed_tiles = 2;
  repeated Meld melds = 3;
  repeated Tile flowers = 4;
  bool winner = 5;
}

message MatchSettlement {
  string room_id = 1;
  string match_id = 2;
  repeated FinalStanding standings = 3;
  uint64 finished_at_unix_ms = 4;
}

message FinalStanding {
  Seat seat = 1;
  string user_id = 2;
  string display_name = 3;
  int64 final_score = 4;
  uint32 rank = 5;
  uint32 rounds_won = 6;
  uint32 self_draw_wins = 7;
}

message Pong {
  string request_id = 1;
  uint64 server_time_ms = 2;
  uint64 echoed_client_time_ms = 3;
  uint64 latest_event_seq = 4;
}
